name: soma

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3001
    init: true
    ports:
      - "3000:80"
    env_file:
      - path: apps/web/.env
        required: false
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "3001:3001"
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/soma
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: bitnami/postgresql:latest
    container_name: soma-postgres
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: soma
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: soma-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transport"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soma-network

  redis:
    image: bitnami/redis:latest
    container_name: soma-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: redis
      REDIS_AOF_ENABLED: yes
      REDIS_MAXMEMORY: 256mb
      REDIS_MAXMEMORY_POLICY: allkeys-lru
      REDIS_REPLICATION_MODE: master
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/bitnami/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soma-network

networks:
  soma-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local